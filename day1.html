<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
　　<meta name="robots" content="noindex">
    <title>基本情報・朝礼5分クイズ</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.6; max-width: 650px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .sticky-header { position: sticky; top: 0; background: #343a40; color: white; padding: 10px; border-radius: 0 0 10px 10px; text-align: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .timer-display { font-size: 1.2em; font-weight: bold; color: #ffc107; }
        
        h1 { font-size: 1.2rem; margin: 5px 0; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.05); margin: 20px 0; border: 1px solid #e9ecef; }
        .question { font-weight: bold; margin-bottom: 15px; color: #004085; }
        .options label { display: block; padding: 10px; margin-bottom: 5px; background: #f8f9fa; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .options label:hover { background: #e9ecef; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        #submit-btn { background: #007bff; color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; margin: 30px 0; }
        #submit-btn:disabled { background: #6c757d; }
        
        .result-box { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid; }
        .correct { background: #d4edda; color: #155724; border-left-color: #28a745; }
        .wrong { background: #f8d7da; color: #721c24; border-left-color: #dc3545; }
        .explanation { font-size: 0.9em; margin-top: 8px; font-weight: normal; color: #495057; }
        .final-score { display: none; font-size: 1.5em; text-align: center; padding: 20px; background: white; border-radius: 12px; border: 2px solid #007bff; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>朝礼クイズ：超基本編</h1>
        <div>経過時間: <span id="timer" class="timer-display">00:00</span></div>
    </div>

    <div id="final-result" class="final-score"></div>

    <form id="quiz-form">
        <div class="card">
            <div class="question">Q1. 16進数の「A」を10進数で表すと？</div>
            <div class="options">
                <label><input type="radio" name="q1" value="0"> 1</label>
                <label><input type="radio" name="q1" value="1"> 10</label>
                <label><input type="radio" name="q1" value="2"> 12</label>
            </div>
            <div id="res-q1" class="result-box"></div>
        </div>

        <div class="card">
            <div class="question">Q2. CPUの構成要素のうち、計算（算術論理演算）を行う装置は？</div>
            <div class="options">
                <label><input type="radio" name="q2" value="0"> 制御装置</label>
                <label><input type="radio" name="q2" value="1"> 演算装置</label>
                <label><input type="radio" name="q2" value="2"> 記憶装置</label>
            </div>
            <div id="res-q2" class="result-box"></div>
        </div>

        <div class="card">
            <div class="question">Q3. CPUと主記憶の速度差を埋めるための高速なメモリは？</div>
            <div class="options">
                <label><input type="radio" name="q3" value="0"> キャッシュメモリ</label>
                <label><input type="radio" name="q3" value="1"> 仮想メモリ</label>
                <label><input type="radio" name="q3" value="2"> フラッシュメモリ</label>
            </div>
            <div id="res-q3" class="result-box"></div>
        </div>

        <div class="card">
            <div class="question">Q4. ITサービスの運用のベストプラクティスを集めたフレームワークは？</div>
            <div class="options">
                <label><input type="radio" name="q4" value="0"> ISO 9001</label>
                <label><input type="radio" name="q4" value="1"> ITIL</label>
                <label><input type="radio" name="q4" value="2"> SLA</label>
            </div>
            <div id="res-q4" class="result-box"></div>
        </div>

        <div class="card">
            <div class="question">Q5. 2進数の「1011」を10進数に変換すると？</div>
            <div class="options">
                <label><input type="radio" name="q5" value="0"> 9</label>
                <label><input type="radio" name="q5" value="1"> 11</label>
                <label><input type="radio" name="q5" value="2"> 13</label>
            </div>
            <div id="res-q5" class="result-box"></div>
        </div>

        <button type="button" id="submit-btn">回答を送信して採点</button>
    </form>

    <script>
        // タイマー処理
        let seconds = 0;
        const timerElement = document.getElementById('timer');
        const timerInterval = setInterval(() => {
            seconds++;
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            timerElement.innerText = `${m}:${s}`;
        }, 1000);

        // 採点処理
        document.getElementById('submit-btn').addEventListener('click', function() {
            clearInterval(timerInterval); // タイマー停止
            
            const answers = {
                q1: { correct: 1, exp: "16進数は 0..9, A(10), B(11)... と続きます。" },
                q2: { correct: 1, exp: "ALU（算術論理演算装置）が計算を、制御装置が命令の解読を行います。" },
                q3: { correct: 0, exp: "主記憶（RAM）より高速なキャッシュメモリを間に挟みます。" },
                q4: { correct: 1, exp: "ITILはITサービスマネジメントの代表的な教科書です。" },
                q5: { correct: 1, exp: "8(2^3) + 0 + 2(2^1) + 1(2^0) = 11 です。" }
            };

            let score = 0;
            for (let qId in answers) {
                const options = document.getElementsByName(qId);
                const resDiv = document.getElementById('res-' + qId);
                let selected = -1;
                for (let i = 0; i < options.length; i++) {
                    if (options[i].checked) selected = i;
                }

                resDiv.style.display = "block";
                if (selected == answers[qId].correct) {
                    score++;
                    resDiv.className = "result-box correct";
                    resDiv.innerHTML = "◯ 正解！<div class='explanation'>" + answers[qId].exp + "</div>";
                } else {
                    resDiv.className = "result-box wrong";
                    resDiv.innerHTML = "× 不正解<div class='explanation'>" + answers[qId].exp + "</div>";
                }
            }

            const finalRes = document.getElementById('final-result');
            finalRes.style.display = "block";
            finalRes.innerHTML = `結果：5問中 ${score} 問正解！<br><small>タイム: ${timerElement.innerText}</small>`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            this.disabled = true;
            this.innerText = "採点完了";
        });
    </script>
</body>
</html>
